<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>PixForge Dashboard</title>
    <script src="src/dashboad.js" type="module"></script>
    <link rel="stylesheet" href="src/style.css">
    <style>
        html,
        body {
            background: radial-gradient(circle at 20% 20%, #1f2937, #020617);
            overflow-x: hidden;
            width: 100%;
            max-width: 100vw;
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar {
            display: none;
        }

        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            opacity: 0.7;
            animation: float 6s infinite linear;
        }

        #particles {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }

        @keyframes float {
            from {
                transform: translateY(100vh);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            to {
                transform: translateY(-10vh);
                opacity: 0;
            }
        }

        .glass {
            backdrop-filter: blur(12px);
            background: rgba(17, 24, 39, 0.6);
        }

        /* 🔥 FIXED IMAGE GRID */
        .image-card {
            width: 100%;
            height: 200px;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 🔥 key fix */
            transition: transform 0.3s ease;
        }

        img {
            max-width: 100%;
            display: block;
        }

        .image-card:hover img {
            transform: scale(1.05);
        }
    </style>
</head>

<body class="text-white min-h-screen relative">

<div id="particles"></div>

<div id="alertBox" class="hidden fixed top-5 right-5 px-4 py-3 rounded-lg text-sm font-medium shadow-lg z-20"></div>

<!-- Image Modal -->
<div id="imageModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-30">
    <div class="glass p-4 rounded-xl max-w-lg text-center">
        <img id="modalImage" class="rounded-lg mb-4" />

        <button id="deleteBtn" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg">
            Delete Image 🗑️
        </button>
    </div>
</div>

<!-- Profile Modal -->
<div id="profileModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-30">
    <div class="glass p-6 rounded-xl w-80 text-center">
        <h2 class="text-xl font-semibold mb-4">Profile</h2>
        <p id="profileUsername" class="text-gray-300 mb-6"></p>

        <button onclick="logoutUser()" class="w-full mb-3 bg-blue-600 hover:bg-blue-700 py-2 rounded-lg">
            Logout
        </button>

        <button onclick="deleteAccount()" class="w-full bg-red-600 hover:bg-red-700 py-2 rounded-lg">
            Delete Account
        </button>
    </div>
</div>

<!-- Navbar -->
<nav class="flex justify-between items-center px-8 py-4 border-b border-gray-800 relative z-10">
    <h1 class="text-xl font-bold">PixForge</h1>

    <div class="flex items-center space-x-3">
        <span id="welcomeText" class="text-sm text-gray-400">Welcome</span>

        <div onclick="openProfileModal()"
             class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center text-lg font-bold cursor-pointer hover:bg-gray-600">
            U
        </div>
    </div>
</nav>

<!-- Main -->
<div class="p-8 relative z-10">

    <!-- Upload -->
    <div class="glass p-6 rounded-xl border border-gray-800 mb-8">
        <h2 class="text-lg font-semibold mb-4">Upload Image</h2>

        <input id="fileInput" type="file" class="mb-4 block text-sm text-gray-300" />

        <button onclick="uploadImage()"
                class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg shadow-lg shadow-blue-500/20">
            Upload
        </button>
    </div>

    <!-- Grid -->
    <div>
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold">Your Images</h2>

            <button onclick="fetchImages()" class="bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded-lg text-sm">
                Refresh 🔄
            </button>
        </div>

        <div id="imageGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </div>
</div>


</body>

</html>
