<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>PixForge Register</title>
    <script src="src/register.js" type="module"></script>
    <link rel="stylesheet" href="src/style.css" />
    <style>
        body {
            background: radial-gradient(circle at 20% 20%, #1f2937, #020617);
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            opacity: 0.7;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            from {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            to {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        .glass {
            backdrop-filter: blur(12px);
            background: rgba(17, 24, 39, 0.6);
        }
    </style>
</head>

<body class="text-white flex items-center justify-center h-screen relative">

<!-- ✨ Particles -->
<div id="particles"></div>

<!-- Alert -->
<div id="alertBox"
     class="hidden fixed top-5 right-5 px-4 py-3 rounded-lg text-sm font-medium shadow-lg z-20"></div>

<!-- Register Card -->
<div class="glass p-8 rounded-2xl shadow-xl w-80 border border-gray-800 relative z-10">

    <h1 class="text-2xl font-bold mb-6 text-center">Register</h1>

    <input id="username" type="text" placeholder="Username"
           class="w-full mb-4 p-2 rounded bg-gray-700 focus:outline-none" />

    <input id="password" type="password" placeholder="Password"
           class="w-full mb-6 p-2 rounded bg-gray-700 focus:outline-none" />

    <button id="registerBtn"
            class="w-full bg-blue-600 hover:bg-blue-700 py-2 rounded font-semibold shadow-lg shadow-blue-500/20">
        Create Account
    </button>

    <p class="text-sm mt-4 text-center text-gray-400">
        Already have an account?
        <a href="login.html" class="text-blue-400 hover:underline">Login</a>
    </p>
</div>


</body>

</html>
