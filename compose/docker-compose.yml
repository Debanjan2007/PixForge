name : pixforge
services:
#  authentication service
  auth:
    build:
      context: ../auth
      dockerfile: Dockerfile
    environment:
      - JWT_AUTH=${JWT_AUTH}
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: always
    expose:
      - "5600"
    networks: 
      - image-processor-network

# image processing service
  image-processor:
    build:
      context: ../image-service
      dockerfile: Dockerfile
    environment:
      - PORT=${PORT}
      - MONGO_URI=${MONGO_URI}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MINIO_ROOT_USERNAME=${MINIO_ROOT_USERNAME}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_REGION=${MINIO_REGION}
      - BUCKET_NAME=${BUCKET_NAME}
      - IMAGEKIT_PUB_KEY=${IMAGEKIT_PUB_KEY}
      - IMAGEKIT_PRIVATE_KEY=${IMAGEKIT_PRIVATE_KEY}
      - IMAGEKIT_URL_ENDPOINT=${IMAGEKIT_URL_ENDPOINT}
      - REDIS_URL=${REDIS_URL}
      - SERVICE_TYPE=${SERVICE_TYPE}
    depends_on:
      db:
          condition: service_healthy
    expose:
      - "4500"
    restart: always
    networks:
      - image-processor-network

# worker service
  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=${REDIS_URL}
      - IMAGEKIT_PUB_KEY=${IMAGEKIT_PUB_KEY}
      - IMAGEKIT_PRIVATE_KEY=${IMAGEKIT_PRIVATE_KEY}
      - IMAGEKIT_URL_ENDPOINT=${IMAGEKIT_URL_ENDPOINT}
      - BUCKET_NAME=${BUCKET_NAME}
      - MINIO_ROOT_USERNAME=${MINIO_ROOT_USERNAME}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_REGION=${MINIO_REGION}
    depends_on:
      minio :
        condition: service_healthy
    networks:
      - image-processor-network


# object storage (minio)
  minio:
    image: quay.io/minio/minio
    container_name: minio
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"  # Web console
      - "9000:9000"  # MinIO server
    expose:
      - "9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USERNAME}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_pixforge_data:/data
    restart: unless-stopped
    networks:
      - image-processor-network
  # database (mongodb)
  db:
    image: mongo:7.0
    container_name: mongodb
    expose:
      - "27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_pixforge_deba_db:/data/db
    networks: 
      - image-processor-network

#  web server (nginx)
  server:
    image: nginx
    container_name: nginx-server
    ports:
      - 8080:80
    depends_on:
      - auth
      - image-processor
      - worker
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: 
      - image-processor-network

# caching server (redis)
  redis :
    image: redis:7.2-alpine
    container_name: redis
    expose:
      - "6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - image-processor-network
    volumes:
      - redis_pixforge_db:/data

networks:
  image-processor-network:
    driver: bridge

volumes:
  mongo_pixforge_deba_db :
    driver: local
  redis_pixforge_db:
    driver: local
  minio_pixforge_data:
    driver: local